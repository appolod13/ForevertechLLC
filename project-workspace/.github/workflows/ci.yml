name: CI

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        working-directory: project-workspace
        run: npm ci || npm install

      - name: Lint
        working-directory: project-workspace
        run: npm run lint

      - name: Typecheck
        working-directory: project-workspace
        run: npm run typecheck

      - name: Test
        working-directory: project-workspace
        run: npm run test

      - name: Build
        working-directory: project-workspace
        run: npm run build

