<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ForeverTeck Static</title>
    <style>
      body { margin:0; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; background:#050607; color:#e5e7eb; }
      .wrap { min-height: 100vh; display:flex; align-items:center; justify-content:center; padding: 24px; }
      .card { max-width: 720px; width: 100%; border: 1px solid #27272a; background: rgba(9,9,11,0.6); border-radius: 18px; padding: 28px; }
      h1 { margin: 0 0 8px; font-size: 26px; }
      p { margin: 0; color: #a1a1aa; line-height: 1.5; }
      code { background:#0b1220; border: 1px solid #1f2937; padding: 2px 6px; border-radius: 8px; color:#c7d2fe; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>ForeverTeck Static Server</h1>
        <p>This is the static site served from <code>static.${DOMAIN}</code> via Traefik.</p>
      </div>
    </div>
  </body>
</html>
