<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Randomize</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #0f1115;
      color: #e8ecf1;
    }
    .wrap {
      max-width: 920px;
      margin: 0 auto;
      padding: 22px;
    }
    h1 { margin: 0 0 10px; font-size: 28px; }
    p { margin: 0 0 16px; color: #a8b3c2; }
    .actions { display: flex; gap: 10px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
    button {
      height: 46px;
      border: 1px solid #2b3646;
      background: #1c2941;
      color: #eef3fb;
      border-radius: 10px;
      padding: 0 18px;
      cursor: pointer;
      font-weight: 700;
      font-size: 15px;
    }
    button:hover { background: #263a61; }
    button:disabled { opacity: 0.55; cursor: not-allowed; }
    .status { color: #9fb4cf; font-size: 14px; min-height: 20px; margin-bottom: 12px; }
    .box {
      border: 1px solid #252b35;
      border-radius: 12px;
      background: #0f131a;
      padding: 12px;
    }
    img {
      width: 100%;
      max-width: 760px;
      display: block;
      margin: 0 auto;
      border-radius: 10px;
      border: 1px solid #2b3444;
      background: #0a0d12;
      min-height: 380px;
      object-fit: contain;
    }
    a { color: #9fb4cf; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>One Button Randomize</h1>
    <p>Press the button to generate a new unique beautiful T‑shirt mockup.</p>

    <div class="actions">
      <button id="randomizeBtn">Randomize</button>
      <a href="/ui/">Advanced</a>
    </div>

    <div class="status" id="status">Ready.</div>

    <div class="box">
      <img id="img" alt="Generated mockup" />
    </div>
  </div>

  <script>
    const btn = document.getElementById("randomizeBtn");
    const statusEl = document.getElementById("status");
    const imgEl = document.getElementById("img");
    let inFlight = false;
    let count = 0;

    function setStatus(s) { statusEl.textContent = s; }

    async function randomize() {
      if (inFlight) return;
      inFlight = true;
      btn.disabled = true;
      setStatus("Generating...");
      try {
        const res = await fetch("/brain/roulette", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ outline: true, outline_style: "color", outline_thickness: 3 })
        });
        if (!res.ok) throw new Error("HTTP " + res.status);
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        imgEl.src = url;
        count += 1;
        const seed = res.headers.get("X-Seed") || "n/a";
        const mode = res.headers.get("X-Mode") || "";
        setStatus(`#${count} seed:${seed} ${mode ? "mode:" + mode : ""}`);
      } catch (e) {
        setStatus("Error: " + e.message);
      } finally {
        inFlight = false;
        btn.disabled = false;
      }
    }

    btn.addEventListener("click", randomize);
  </script>
</body>
</html>
