<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Beautiful T-Shirt Generator</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #0f1115;
      color: #e8ecf1;
    }
    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 20px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }
    p {
      margin: 0 0 16px;
      color: #a8b3c2;
    }
    .actions {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    button {
      height: 42px;
      border: 1px solid #2b3646;
      background: #1c2941;
      color: #eef3fb;
      border-radius: 8px;
      padding: 0 16px;
      cursor: pointer;
      font-weight: 600;
    }
    button:hover { background: #263a61; }
    button:disabled { opacity: 0.55; cursor: not-allowed; }
    .status {
      margin-bottom: 14px;
      color: #9fb4cf;
      font-size: 14px;
      min-height: 20px;
    }
    .image-box {
      border: 1px solid #252b35;
      border-radius: 12px;
      background: #0f131a;
      padding: 12px;
    }
    .main-img {
      width: 100%;
      max-width: 760px;
      display: block;
      margin: 0 auto;
      border-radius: 10px;
      border: 1px solid #2b3444;
      background: #0a0d12;
      min-height: 360px;
      object-fit: contain;
    }
    .history {
      margin-top: 12px;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
    }
    .history img {
      width: 140px;
      height: 140px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid #2b3444;
      background: #0a0d12;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Beautiful T-Shirt Generator</h1>
    <p>Press one button. Every click generates a new unique beautiful mockup.</p>

    <div class="actions">
      <button id="generate">Generate Beautiful</button>
    </div>

    <div class="status" id="status">Ready.</div>

    <div class="image-box">
      <img id="mainImage" class="main-img" alt="Generated t-shirt mockup" />
      <div class="history" id="history"></div>
    </div>
  </div>

  <script>
    const statusEl = document.getElementById("status");
    const mainImage = document.getElementById("mainImage");
    const historyEl = document.getElementById("history");
    const generateBtn = document.getElementById("generate");

    let inFlight = false;
    let count = 0;

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function addToHistory(src, label) {
      const img = document.createElement("img");
      img.src = src;
      img.alt = label;
      img.title = label;
      img.onclick = () => {
        mainImage.src = src;
        setStatus("Viewing: " + label);
      };
      historyEl.prepend(img);
      while (historyEl.children.length > 14) {
        historyEl.removeChild(historyEl.lastChild);
      }
    }

    async function generateOnce() {
      if (inFlight) return;
      inFlight = true;
      generateBtn.disabled = true;
      setStatus("Generating...");
      try {
        const res = await fetch("/brain/roulette", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: "{}"
        });
        if (!res.ok) {
          throw new Error("HTTP " + res.status);
        }
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        mainImage.src = url;
        const seed = res.headers.get("X-Seed") || "n/a";
        const job = res.headers.get("X-Job-Id") || "";
        const init = res.headers.get("X-Init") || "";
        const prompt = res.headers.get("X-Prompt") || "";
        count += 1;
        const mode = res.headers.get("X-Mode") || "";
        const label = `#${count} seed:${seed} ${mode ? "mode:" + mode : ""} ${init ? "init:" + init : ""} job:${job.slice(0, 8)}`;
        addToHistory(url, label);
        setStatus(prompt ? ("Done: " + label + " | " + prompt) : ("Done: " + label));
      } catch (err) {
        setStatus("Error: " + err.message);
      } finally {
        inFlight = false;
        generateBtn.disabled = false;
      }
    }

    generateBtn.addEventListener("click", generateOnce);
  </script>
</body>
</html>
